---
- name: QNI VLAN Provisioning — All Access Switches
  hosts: access_switches
  gather_facts: no

  vars:
    vlans:
      - { id: 10, name: "Management" }
      - { id: 20, name: "Office_Data" }
      - { id: 30, name: "Office_Voice" }
      - { id: 40, name: "DC_DMZ" }
      - { id: 50, name: "DC_Internal_Trusted" }

  tasks:
    - name: Create and activate VLANs
      cisco.ios.ios_vlans:
        config:
          - vlan_id: "{{ item.id }}"
            name: "{{ item.name }}"
            state: active
        state: merged
      loop: "{{ vlans }}"

    - name: Configure access ports 1-5 for Office Data (VLAN 20)
      cisco.ios.ios_l2_interfaces:
        config:
          - name: "GigabitEthernet0/{{ item }}"
            mode: access
            access:
              vlan: 20
        state: merged
      loop: [1, 2, 3, 4, 5]

    - name: Assign Voice VLAN 30 to access ports 1-5
      cisco.ios.ios_config:
        lines:
          - switchport voice vlan 30
        parents: "interface GigabitEthernet0/{{ item }}"
      loop: [1, 2, 3, 4, 5]

    - name: Enable PortFast and BPDU Guard on access ports
      cisco.ios.ios_config:
        lines:
          - spanning-tree portfast
          - spanning-tree bpduguard enable
        parents: "interface GigabitEthernet0/{{ item }}"
      loop: [1, 2, 3, 4, 5]

    - name: Configure uplink trunk to VSS Core (port 48)
      cisco.ios.ios_l2_interfaces:
        config:
          - name: GigabitEthernet0/48
            mode: trunk
            trunk:
              allowed_vlans: "10,20,30,40,50"
              native_vlan: 999
        state: merged

    - name: Configure second uplink trunk to VSS Core (port 47)
      cisco.ios.ios_l2_interfaces:
        config:
          - name: GigabitEthernet0/47
            mode: trunk
            trunk:
              allowed_vlans: "10,20,30,40,50"
              native_vlan: 999
        state: merged

    - name: Save running configuration to startup
      cisco.ios.ios_config:
        save_when: always
